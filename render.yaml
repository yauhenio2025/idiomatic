# Render blueprint for idiomatic.
# Push to main and Render picks this up.
#
# Note on disks: Render attaches a persistent disk to exactly one service.
# So worker + API share one container (the API process spawns the worker
# loop as an asyncio task at startup) and one disk. The cron is separate
# (it doesn't need /data — just enqueues videos in the db).
#
# Secrets: GEMINI_API_KEY and ELEVENLABS_API_KEY are declared with
# `sync: false`. At the first deploy Render prompts you to paste each
# value; they're stored per-service. Edit them later in
# Dashboard → service → Environment.

databases:
  - name: idiomatic-db
    plan: basic-256mb
    region: frankfurt
    postgresMajorVersion: "16"

services:
  - type: cron
    name: idiomatic-cron
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    schedule: "0 */2 * * *"            # every 2 hours
    buildCommand: pip install uv && uv sync
    startCommand: uv run python -m idiomatic.cron
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: idiomatic-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false

  # API + worker live in one process. FastAPI serves the agent endpoints;
  # an asyncio background task drains the videos queue. They share /data.
  - type: web
    name: idiomatic-app
    runtime: docker
    plan: standard                     # worker side does real CPU work
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: uv run uvicorn idiomatic.api:app --host 0.0.0.0 --port $PORT
    disk:
      name: idiomatic-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: idiomatic-db
          property: connectionString
      - key: DATA_DIR
        value: /data
      - key: GEMINI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
