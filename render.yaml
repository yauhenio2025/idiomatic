# Render blueprint for idiomatic.
# Push to main and Render picks this up.
#
# Secrets live in env group `idiomatic-secrets` (create it in the dashboard
# once and attach to both services). See ARCHITECTURE.md for the env vars
# expected.

databases:
  - name: idiomatic-db
    plan: basic-256mb
    region: frankfurt
    postgresMajorVersion: "16"

services:
  - type: cron
    name: idiomatic-cron
    runtime: python
    plan: starter
    region: frankfurt
    branch: main
    schedule: "0 */2 * * *"            # every 2 hours
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uv run python -m idiomatic.cron
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: idiomatic-db
          property: connectionString
      - fromGroup: idiomatic-secrets

  - type: worker
    name: idiomatic-worker
    runtime: docker                    # Dockerfile pulls ffmpeg + yt-dlp
    plan: standard
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    disk:
      name: idiomatic-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: idiomatic-db
          property: connectionString
      - key: DATA_DIR
        value: /data
      - fromGroup: idiomatic-secrets
